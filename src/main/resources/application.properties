# =============================================================================
# Assessment Service — evaluaciones, notas, promedios y auditoria (schema assessment)
# =============================================================================

# ── Datasource (credenciales exclusivas al schema `assessment`) ──────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:assessment_user}
quarkus.datasource.password=${DB_PASSWORD:assessment_pass}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:edutrack}

# ── Hibernate: DDL gestionado exclusivamente por Flyway ──────────────────────
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.database.default-schema=assessment

# Dev valida que el mapeo JPA coincide exactamente con el DDL de Flyway.
%dev.quarkus.hibernate-orm.database.generation=validate
%dev.quarkus.hibernate-orm.log.sql=true

# ── Flyway ───────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=assessment
quarkus.flyway.default-schema=assessment
quarkus.flyway.create-schemas=true
quarkus.flyway.locations=classpath:db/migration

# ── Auth proactiva deshabilitada: la identidad llega como cabeceras internas ──
quarkus.http.auth.proactive=false

# ── Service discovery (commons): override local para docker-compose ──────────
# En Fly.io el patron por defecto (edutrack-{service}.fly.internal:8080) resuelve
# solo; en local el contenedor se llama "student", no "edutrack-student".
%dev.edutrack.discovery.pattern={service}:8080

# ── Interpretacion de cabeceras internas del Gateway (RequestContext) ────────
# EAGER: header presente pero malformado => 400. WARN: loguea y trata como ausente.
edutrack.headers.validation.mode=EAGER

# ── Exposicion de stack trace en el body de errores (GlobalExceptionMappers) ─
edutrack.errors.expose-stacktrace=false

# ── OpenAPI / Swagger UI bajo /assessment (contrato del Gateway: 1er segmento) ─
quarkus.smallrye-openapi.info-title=Assessment MS API
quarkus.smallrye-openapi.info-version=1.0.0-SNAPSHOT
quarkus.smallrye-openapi.info-description=EduTrack - Evaluaciones, notas y promedios ponderados
quarkus.smallrye-openapi.path=/assessment/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/assessment/q/swagger-ui
quarkus.swagger-ui.title=EduTrack Assessment Service API

# ── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."cl.duocuc.edutrack".level=DEBUG
